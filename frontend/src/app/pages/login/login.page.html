<!-- src/app/pages/login/login.page.html -->
<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Forest Monitoring</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="login-container">
    <ion-card>
      <ion-card-header>
        <ion-card-title>Connexion</ion-card-title>
        <ion-card-subtitle>Système de monitoring forestier</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>
        <ion-item>
          <ion-label position="floating">Email</ion-label>
          <ion-input 
            type="email" 
            [(ngModel)]="email"
            placeholder="votre.email@exemple.com">
          </ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Mot de passe</ion-label>
          <ion-input 
            type="password" 
            [(ngModel)]="password"
            placeholder="••••••••">
          </ion-input>
        </ion-item>

        <ion-button 
          expand="block" 
          (click)="login()" 
          class="ion-margin-top"
          [disabled]="!email || !password">
          Se connecter
        </ion-button>

        <!-- Bouton démo pour tester sans backend -->
        <ion-button 
          expand="block" 
          fill="outline"
          (click)="loginDemo()" 
          class="ion-margin-top"
          color="warning">
          Mode Démo (Test)
        </ion-button>

        <p class="ion-text-center ion-margin-top">
          Accès pour : Gardes forestiers, Pompiers, Propriétaires
        </p>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
