<ion-header>
  <ion-toolbar color="success">
    <ion-title>🌲 Accueil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-card class="welcome-card">
    <ion-card-content>
      <h1>Système de Monitoring Forêt</h1>
      <p>Bienvenue sur la plateforme de surveillance des capteurs forestiers.</p>
    </ion-card-content>
  </ion-card>

  <div *ngIf="isLoading" class="loading">
    <ion-text color="medium">
      <p>Chargement des données...</p>
    </ion-text>
  </div>

  <ion-grid *ngIf="!isLoading">
    <ion-row>
      <ion-col size="12" size-md="6">
        <ion-card>
          <ion-card-content>
            <div class="stat-box">
              <ion-text color="success">
                <h2>{{ activeSensors }}</h2>
                <p>Capteurs Actifs</p>
              </ion-text>
            </div>
          </ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col size="12" size-md="6">
        <ion-card>
          <ion-card-content>
            <div class="stat-box">
              <ion-text [color]="alertsCount > 0 ? 'danger' : 'medium'">
                <h2>{{ alertsCount }}</h2>
                <p>Alertes Actives</p>
              </ion-text>
            </div>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>

    <ion-row>
      <ion-col size="12">
        <ion-text>
          <h3>Navigation</h3>
        </ion-text>
      </ion-col>
    </ion-row>

    <ion-row class="nav-buttons">
      <ion-col size="12" size-sm="6">
        <ion-button expand="block" routerLink="/dashboard" color="primary">
          <ion-icon slot="start" name="bar-chart-outline"></ion-icon>
          Tableau de Bord
        </ion-button>
      </ion-col>
      <ion-col size="12" size-sm="6">
        <ion-button expand="block" routerLink="/map" color="success">
          <ion-icon slot="start" name="map-outline"></ion-icon>
          Carte
        </ion-button>
      </ion-col>
    </ion-row>

    <ion-row class="nav-buttons">
      <ion-col size="12" size-sm="6">
        <ion-button expand="block" routerLink="/history" color="warning">
          <ion-icon slot="start" name="time-outline"></ion-icon>
          Historique
        </ion-button>
      </ion-col>
      <ion-col size="12" size-sm="6">
        <ion-button expand="block" routerLink="/profile" color="secondary">
          <ion-icon slot="start" name="settings-outline"></ion-icon>
          Profil
        </ion-button>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
