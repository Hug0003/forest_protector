apiVersion: 1

providers:
  - name: Forest Monitoring Dashboards
    orgId: 1
    folder: Forest Monitoring
    type: file
    # Désactive les mises à jour manuelles via l'interface Grafana
    # (les dashboards sont gérés par fichiers)
    disableDeletion: false
    editable: true
    options:
      # Dossier où seront lus les fichiers .json des dashboards
      path: /var/lib/grafana/dashboards
