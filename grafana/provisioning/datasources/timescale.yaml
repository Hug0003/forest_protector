apiVersion: 1

datasources:
  - name: TimescaleDB
    type: postgres
    # 'timescaledb' = nom du service Docker défini dans docker-compose.yml
    url: timescaledb:5432
    database: forest_monitoring
    user: forest_admin
    # Le mot de passe est injecté via la variable d'environnement DB_PASSWORD
    secureJsonData:
      password: ${DB_PASSWORD}
    jsonData:
      sslmode: disable
      postgresVersion: 1400   # PostgreSQL 14
      timescaledb: true        # Active les optimisations TimescaleDB dans Grafana
    # isDefault: true → cette source de données est sélectionnée par défaut
    isDefault: true
    editable: false
