# nginx.conf

# =============================================
# Bloc HTTP -> Redirige tout vers HTTPS
# =============================================
server {
    listen 80;
    server_name VOTRE_DOMAINE;

    # Dossier utilisé par Certbot pour la vérification du domaine
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Toute autre requête HTTP est redirigée en HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================
# Bloc HTTPS (SSL)
# =============================================
server {
    listen 443 ssl;
    server_name VOTRE_DOMAINE;

    # Certificats SSL Let's Encrypt
    ssl_certificate     /etc/nginx/ssl/live/VOTRE_DOMAINE/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/VOTRE_DOMAINE/privkey.pem;

    # Paramètres SSL sécurisés
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Frontend Angular
    location / {
        proxy_pass http://frontend:8100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Grafana
    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}