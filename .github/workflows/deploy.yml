name: CI/CD Pipeline — Forest Monitoring

# Déclenchement du pipeline
on:
  push:
    branches: [main, develop]     # Sur push vers ces branches
  pull_request:
    branches: [main]              # Sur pull request vers main

jobs:
  # ===========================================================
  # JOB 1 : Tests du backend Python
  # ===========================================================
  test-backend:
    name: Tests Backend (Python)
    runs-on: ubuntu-latest

    # Service TimescaleDB pour les tests (similaire à docker compose)
    services:
      postgres:
        image: timescale/timescaledb:latest-pg14
        env:
          POSTGRES_DB: forest_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        # Attend que la DB soit prête avant de lancer les tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Récupère le code source
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configure Python 3.11
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # Cache pip pour accélérer les builds suivants
          cache: 'pip'

      # 3. Installe les dépendances
      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      # 4. Crée le fichier .env pour les tests
      - name: Create test .env
        run: |
          cd backend
          echo "DATABASE_URL=postgresql+asyncpg://test_user:test_password@localhost:5432/forest_test" > .env
          echo "JWT_SECRET=test_secret_key_for_ci_pipeline_only" >> .env

      # 5. Lance les tests avec rapport de couverture
      - name: Run tests with coverage
        run: |
          cd backend
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      # 6. Upload le rapport de couverture (optionnel, pour Codecov)
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./backend/coverage.xml

  # ===========================================================
  # JOB 2 : Tests du frontend Angular
  # ===========================================================
  test-frontend:
    name: Tests Frontend (Angular)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          # Cache npm pour accélérer les builds
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: |
          cd frontend
          npm ci   # Installation propre (respecte package-lock.json)

      - name: Run unit tests
        run: |
          cd frontend
          npm run test:ci   # Lance Angular tests en mode headless CI

      - name: Build production
        run: |
          cd frontend
          npm run build   # Vérifie que le build ne produit pas d'erreur

  # ===========================================================
  # JOB 3 : Build + Push des images Docker
  # ===========================================================
  build-and-push:
    name: Build & Push Docker Images
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/forest-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/forest-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/forest-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/forest-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================
  # JOB 4 : Déploiement (désactivé — pas de serveur encore)
  # ===========================================================
  deploy:
    name: Deploy to Production
    needs: build-and-push
    # Ce job est désactivé tant que le serveur n'est pas configuré
    if: false
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        run: echo "Déploiement à configurer quand le serveur sera prêt"